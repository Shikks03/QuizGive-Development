<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>QuizGive</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="qg.css" />

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<!-- Plain JS deps (load first) -->
<script src="qg-parser.js"></script>
<script src="qg-export.js"></script>

<!-- Attempt to fetch the sample quizfetch on startup so "Try sample" can work.
     Silent on failure — sample button just hides. -->
<script>
  (async () => {
    try {
      const r = await fetch('sample-quizfetch.html');
      if (r.ok) {
        const html = await r.text();
        window.__QG_SAMPLE__ = { name: 'sample-quizfetch.html', html };
      }
    } catch {}
  })();
</script>

<!-- React modules (order matters: icons → store → shell → screens → quiz → app) -->
<script type="text/babel" src="qg-icons.jsx"></script>
<script type="text/babel" src="qg-store.jsx"></script>
<script type="text/babel" src="qg-shell.jsx"></script>
<script type="text/babel" src="qg-screens.jsx"></script>
<script type="text/babel" src="qg-quiz.jsx"></script>
<script type="text/babel" src="qg-app.jsx"></script>

</body>
</html>
